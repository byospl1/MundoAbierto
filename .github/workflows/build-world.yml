name: Regenerar mundo desde el vault

on:
  push:
    paths:
      - 'vault/**'
      - 'scripts/build-world.mjs'
  schedule:
    - cron: '0 12 * * 0'   # cada DOMINGO 12:00 UTC — regenera el mundo automáticamente
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Generar world.json
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/build-world.mjs
      - name: Commit si hay cambios
        run: |
          git config user.name "torre-bot"
          git config user.email "actions@github.com"
          git add world.json .world-cache.json
          git diff --cached --quiet || git commit -m "🐉 Mundo regenerado desde el vault"
          git push
